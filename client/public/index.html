<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartify LB - Electronic Devices Store</title>
    <link rel="icon" href="https://via.placeholder.com/32x32.png?text=S" type="image/png">

    <!-- Google Font: Great Vibes (ornate) -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom animations -->
    <style>
        @keyframes fade-in {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .animate-fade-in {
            animation: fade-in 0.2s ease-out;
        }
        
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
    </style>

    <meta name="description" content="Smartify LB - Buy the latest electronic devices online. Smartphones, laptops, smart watches, headphones, and more!">
</head>
<body>
    <div id="root"></div>
</body>
</html>
